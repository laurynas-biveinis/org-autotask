---
name: Emacs Lisp CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        emacs_version:
          - "snapshot"
          - "release-snapshot"
          - "30.1"
          - "29.4"
          - "28.2"
        include:
          - os: ubuntu-latest
            emacs_version: "27.2"

    permissions:
      contents: read
      packages: read
      # To report GitHub Actions status checks
      statuses: write
      # To create test report checks
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Emacs
        uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Set up Eask
        uses: emacs-eask/setup-eask@master
        with:
          version: "snapshot"

      - name: Run tests
        env:
          EMACS_TEST_JUNIT_REPORT: ${{ (matrix.emacs_version != '27.2' && matrix.emacs_version != '28.2') && 'org-autotask-test.xml' || '' }}
        run: |
          eask clean all
          eask package
          eask install
          eask compile
          eask lint elisp-lint
          eask lint elisp-lint org-autotask-test.el
          eask lint keywords
          eask lint regexps
          eask run script test

      # org-lint is effectively version-independent, so run it once rather than
      # across the whole matrix.
      - name: Lint README.org
        if: matrix.os == 'ubuntu-latest' && matrix.emacs_version == 'snapshot'
        run: eask run script org-lint

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: matrix.emacs_version != '27.2' && matrix.emacs_version != '28.2'
        with:
          name: test-results-${{ matrix.os }}-emacs-${{ matrix.emacs_version }}
          path: org-autotask-test.xml
          retention-days: 7

      - name: Test Report
        uses: dorny/test-reporter@v3
        if: matrix.emacs_version != '27.2' && matrix.emacs_version != '28.2'
        with:
          name: Test Results - ${{ matrix.os }} - Emacs ${{ matrix.emacs_version }}
          path: org-autotask-test.xml
          reporter: java-junit
